name: PR bot queue

# Runs the non-GPU PR gate chain all day and keeps dashboard/data.json aligned
# with the current queue. It checks out protected main code only; it never runs
# code from a contributor PR.

on:
  pull_request_target:
    types: [opened, reopened, synchronize, edited, ready_for_review]
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  STATE_BRANCH: bot/dashboard-state

concurrency:
  group: bot-state-pipeline
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Restore queue state from bot branch
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin "$STATE_BRANCH" >/dev/null 2>&1; then
            git fetch --depth=1 origin "$STATE_BRANCH"
            if git cat-file -e "origin/$STATE_BRANCH:dashboard/data.json" 2>/dev/null; then
              mkdir -p dashboard
              git show "origin/$STATE_BRANCH:dashboard/data.json" > dashboard/data.json
            fi
          else
            echo "State branch $STATE_BRANCH does not exist yet."
          fi

      - name: Sweep open PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run --extra test python -m eval.pr_bot \
            --repo "${{ github.repository }}" \
            --write \
            --dashboard-data dashboard/data.json

      - name: Publish dashboard queue to bot branch
        run: |
          set -euo pipefail
          if git diff --quiet -- dashboard/data.json; then
            echo "No dashboard queue changes."
            exit 0
          fi
          tmpdir="$(mktemp -d)"
          cp dashboard/data.json "$tmpdir/data.json"
          git restore dashboard/data.json
          if git ls-remote --exit-code --heads origin "$STATE_BRANCH" >/dev/null 2>&1; then
            git fetch --depth=1 origin "$STATE_BRANCH"
            git switch -C "$STATE_BRANCH" "origin/$STATE_BRANCH"
          else
            git switch -c "$STATE_BRANCH"
          fi
          mkdir -p dashboard
          cp "$tmpdir/data.json" dashboard/data.json
          if git diff --quiet -- dashboard/data.json; then
            echo "State branch already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard/data.json
          git commit -m "dashboard: update PR GPU queue"
          git push origin HEAD:"$STATE_BRANCH"
