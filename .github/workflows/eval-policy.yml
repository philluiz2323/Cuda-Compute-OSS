name: Eval policy CI

# Pure CPU sanity checks: syntax + unit tests for the scoring/bot library and
# the existing correctness gates. No GPU, no secrets beyond the default
# read-only GITHUB_TOKEN -- standard `pull_request` CI (isolated, ephemeral
# runner), safe to run directly against a PR's own code. Doubles as CCO's
# smoke-test CI: torch is deliberately NOT installed here, so the existing
# GPU-only tests skip cleanly (tests/test_correctness.py,
# strategy/tests/test_subspace.py, eval/tests/test_eval.py already handle
# this -- see their HAVE_GPU / pytest.mark.skipif pattern) rather than
# needing any special-casing in this workflow.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: eval-policy-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CPU-only dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pytest

      - name: Syntax check every module
        run: python -m py_compile $(find matmul strategy eval tests examples -name '*.py')

      - name: Run the CPU-safe test suite
        run: python -m pytest tests/ strategy/tests/ eval/tests/ -v
