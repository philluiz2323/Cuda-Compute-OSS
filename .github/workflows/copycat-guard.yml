name: Copycat guard

# Real-time check when a PR is opened: does its diff substantially reproduce
# an earlier PR? See eval/copycat_guard.py and .github/COPYCATS.md.
#
# Security pattern mirrors sparkinfer's copycat-guard.yml exactly: triggered
# by a PR event, but the checked-out code is pinned to `main` (never the
# PR's own branch) and the script only ever calls `gh` for diff TEXT -- no
# PR code is ever executed. Skipped for maintainers (nothing to catch).

on:
  pull_request_target:
    types: [opened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: copycat-guard-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check:
    if: >
      github.event.pull_request.author_association != 'OWNER' &&
      github.event.pull_request.author_association != 'MEMBER' &&
      github.event.pull_request.author_association != 'COLLABORATOR'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main   # deliberately NOT the PR's head -- see module docstring

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run the real-time copycat check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python3 -m eval.copycat_guard
