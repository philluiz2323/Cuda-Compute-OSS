name: Sensitive paths guard

# Hard-fails a non-maintainer PR that touches the scoring harness, docs, CI
# config, or the bot-owned dashboard data feed (see .github/CODEOWNERS,
# docs/sn74-emission-strategy.md). Mirrors sparkinfer's
# sensitive-paths-guard.yml: pull_request_target so the guard itself (read
# from protected main) cannot be weakened by the very PR it's checking, and
# it only ever reads a changed-file list -- it never checks out PR code.

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: sensitive-paths-guard-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  guard:
    if: >
      github.event.pull_request.author_association != 'OWNER' &&
      github.event.pull_request.author_association != 'MEMBER' &&
      github.event.pull_request.author_association != 'COLLABORATOR'
    runs-on: ubuntu-latest
    steps:
      - name: Check changed files against protected paths
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          changed="$(gh pr diff "$PR_NUMBER" -R "$REPO" --name-only)"
          echo "Changed files:"
          echo "$changed"

          protected_regex='^(eval/|docs/|\.github/|dashboard/data\.json$)'
          hit="$(echo "$changed" | grep -E "$protected_regex" || true)"

          if [ -n "$hit" ]; then
            echo "::error::This PR touches maintainer-owned paths (see .github/CODEOWNERS):"
            echo "$hit"
            echo "::error::These paths are protected because they define or verify scoring itself (docs/sn74-emission-strategy.md). If your change genuinely belongs here, ask a maintainer to review/merge it directly."
            exit 1
          fi
          echo "No protected paths touched."
