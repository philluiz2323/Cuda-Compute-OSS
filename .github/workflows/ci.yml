name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-import:
    name: lint + registry import check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint deps
        run: pip install "ruff>=0.4.0"

      - name: Lint with ruff
        run: ruff check .

      - name: Verify kernel_configs registry imports cleanly
        run: python -c "import kernel_configs; print('ok')"
